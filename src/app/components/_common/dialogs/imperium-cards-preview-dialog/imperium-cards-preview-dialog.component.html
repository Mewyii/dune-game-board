<h1 mat-dialog-title [class]="data.colorScheme">{{ data.title }}</h1>
<div mat-dialog-content class="dialog-content">
  @if (data.search) {
    <div>
      <mat-form-field>
        <mat-label>{{ t.translate('imperiumcardspreviewSearchTooltip') }}</mat-label>
        <input matInput [(ngModel)]="searchString" (input)="filterCards()" />
      </mat-form-field>
    </div>
  }
  <div class="cards-container">
    <div
      class="card-container"
      *ngFor="let card of imperiumCards"
      [class.selectable]="isSelectMode"
      [class.selected]="isSelected(card)"
      (click)="onCardClick(card)"
      (mouseenter)="hoveredCardId = card.id"
      (mouseleave)="hoveredCardId = ''"
    >
      <dune-highlighting
        *ngIf="card.id === selectedCard?.id || card.id === hoveredCardId"
        [id]="card.id"
        [width]="300"
        [height]="400"
        [bottom]="-20"
        [left]="-25"
      ></dune-highlighting>
      <dune-imperium-row-card [card]="card"> </dune-imperium-row-card>
      <div
        class="card-action-container"
        *ngIf="
          data.canAquireCards && (!data.aquirableFactionTypes || data.aquirableFactionTypes.includes(card.faction ?? ''))
        "
      >
        <button class="card-buy-button" mat-fab [color]="'accent'" (click)="onBuyCardClicked(card)">
          <mat-icon>check</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
<div mat-dialog-actions>
  @if (isSelectMode) {
    <button
      mat-mini-fab
      [color]="'accent'"
      [disabled]="!selectedCard"
      (click)="onConfirm()"
      [matTooltip]="t.translate('commonConfirm')"
    >
      <mat-icon>check</mat-icon>
    </button>
  } @else {
    <button mat-mini-fab [color]="'accent'" (click)="onClose()" [matTooltip]="t.translate('commonCancel')">
      <mat-icon>close</mat-icon>
    </button>
  }
</div>
